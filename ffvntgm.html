<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=yes">
  <title>FFVN.TGM • Trang Chủ</title>
  <!-- Font chuyên nghiệp: Bebas Neue + Oxanium + Rajdhani -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oxanium:wght@500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #07090c;
      font-family: 'Rajdhani', 'Oxanium', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background-image: radial-gradient(circle at 30% 30%, rgba(255, 140, 0, 0.07) 0%, transparent 50%);
    }

    /* Wrapper chính */
    .app-wrapper {
      width: 100%;
      max-width: 450px;
      position: relative;
    }

    /* TRANG CHỦ */
    .home-container {
      background: rgba(12, 14, 18, 0.96);
      backdrop-filter: blur(24px);
      border-radius: 38px;
      box-shadow: 0 35px 55px -18px rgba(0,0,0,0.95), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 20px 20px 32px;
      border: 1px solid rgba(255, 152, 0, 0.3);
      display: block;
    }

    /* TOP BAR: logo nhỏ + menu */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* LOGO DUY NHẤT (nhỏ) */
    .logo-small {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      object-fit: cover;
      background: #1a1e26;
      box-shadow: 0 10px 22px rgba(255, 140, 0, 0.45);
      border: 2px solid #ff8c00;
    }

    .brand-name {
      font-family: 'Bebas Neue', 'Oxanium', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 3px;
      background: linear-gradient(180deg, #ffaa33 0%, #ff7b00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 18px #ff8c00cc;
      line-height: 1;
      text-transform: uppercase;
    }

    /* Nút 3 gạch */
    .menu-toggle {
      background: rgba(18, 20, 25, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 152, 0, 0.55);
      color: #ffa500;
      font-size: 2rem;
      width: 50px;
      height: 50px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 18px rgba(0,0,0,0.7);
      line-height: 1;
    }

    .menu-toggle:hover {
      background: #ff8c00;
      color: #0b0c0e;
      border-color: #ff8c00;
    }

    /* Menu dropdown */
    .menu-dropdown {
      position: absolute;
      top: 80px;
      right: 20px;
      background: rgba(8, 10, 14, 0.97);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 140, 0, 0.7);
      border-radius: 24px;
      box-shadow: 0 28px 45px rgba(0,0,0,0.9);
      padding: 14px 8px;
      display: none;
      flex-direction: column;
      gap: 8px;
      min-width: 190px;
      z-index: 30;
    }

    .menu-dropdown.active {
      display: flex;
    }

    .menu-item {
      background: transparent;
      border: none;
      color: #e0e0e0;
      font-family: 'Oxanium', 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.35rem;
      padding: 14px 20px;
      border-radius: 18px;
      text-align: left;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .menu-item:hover {
      background: #ff8c00;
      color: #000;
      font-weight: 800;
    }

    /* Tiêu đề danh sách */
    .section-label {
      color: #b9b9b9;
      font-family: 'Oxanium', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 2px;
      margin: 8px 0 16px 8px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* DANH SÁCH TO RÕ RÀNG */
    .tool-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 8px;
    }

    .tool-card {
      background: #11141b;
      border: 1px solid rgba(255, 152, 0, 0.3);
      border-radius: 26px;
      padding: 22px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 12px 20px -8px rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      min-height: 80px;
    }

    .tool-card:hover {
      border-color: #ff8c00;
      background: #191d27;
      box-shadow: 0 16px 28px -6px rgba(255, 140, 0, 0.35);
      transform: translateY(-2px);
    }

    .tool-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .tool-icon {
      font-size: 2.4rem;
      filter: drop-shadow(0 0 10px #ff8c00);
    }

    .tool-text {
      display: flex;
      flex-direction: column;
    }

    .tool-name {
      font-family: 'Oxanium', 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: 0.8px;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .tool-desc {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: #aaaaaa;
      letter-spacing: 0.4px;
      margin-top: 4px;
    }

    .tool-arrow {
      color: #ff8c00;
      font-size: 2rem;
      font-weight: 600;
    }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      color: #5f6878;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1.2px;
    }

    /* TRANG UPDATE */
    .update-page {
      display: none;
      width: 100%;
      background: rgba(12, 14, 18, 0.98);
      backdrop-filter: blur(24px);
      border-radius: 38px;
      padding: 30px 20px 36px;
      border: 1px solid rgba(255, 152, 0, 0.45);
      box-shadow: 0 35px 55px -18px black;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .update-page.active-page {
      display: flex;
    }

    .update-icon {
      font-size: 4.2rem;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 16px #ff8c00);
    }

    .update-title {
      font-family: 'Bebas Neue', 'Oxanium', sans-serif;
      font-size: 3rem;
      letter-spacing: 4px;
      background: linear-gradient(180deg, #ffb347, #ff7b00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 8px 0;
    }

    .update-sub {
      font-family: 'Oxanium', sans-serif;
      font-weight: 600;
      color: #e2e2e2;
      background: rgba(255,140,0,0.12);
      padding: 14px 22px;
      border-radius: 28px;
      font-size: 1.2rem;
      letter-spacing: 0.6px;
      margin: 16px 0 24px;
      border: 1px dashed #ff8c00;
    }

    .back-home-btn {
      background: #181b24;
      border: 1px solid #ff8c00;
      color: #ff8c00;
      font-family: 'Oxanium', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      padding: 16px 32px;
      border-radius: 34px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-home-btn:hover {
      background: #ff8c00;
      color: #07090c;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 380px) {
      .brand-name {
        font-size: 1.9rem;
      }
      .tool-name {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-wrapper" id="appRoot">
    <!-- ========== TRANG CHỦ ========= -->
    <div id="homePage" class="home-container">
      <div class="top-bar">
        <div class="logo-area">
          <!-- CHỈ 1 LOGO NHỎ, không còn logo to -->
          <img 
            src="https://cdn.phototourl.com/free/2026-07-22-a87a09e5-ecab-46a2-8034-56cb8bcff4ed.jpg" 
            alt="FFVN Logo" 
            class="logo-small"
            onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22 viewBox=%220 0 52 52%22%3E%3Crect width=%2252%22 height=%2252%22 rx=%2214%22 fill=%22%231a1e26%22/%3E%3Ctext x=%2226%22 y=%2236%22 font-size=%2224%22 text-anchor=%22middle%22 fill=%22%23ff8c00%22 font-weight=%22bold%22%3EFF%3C/text%3E%3C/svg%3E';"
          >
          <span class="brand-name">FFVN.TGM</span>
        </div>
        <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
      </div>

      <!-- Menu dropdown -->
      <div class="menu-dropdown" id="menuDropdown">
        <button class="menu-item" id="menuHomeBtn"><span>🏠</span> Trang Chủ</button>
        <button class="menu-item" id="menuUpdateBtn"><span>🔔</span> UPDATE</button>
      </div>

      <!-- Tiêu đề phần danh sách -->
      <div class="section-label">
        <span>⚡</span> CÔNG CỤ TRA CỨU
      </div>

      <!-- DANH SÁCH TÁCH RIÊNG, KHUNG TO ĐẸP -->
      <div class="tool-list">
        <div class="tool-card" id="toolTraCuu">
          <div class="tool-info">
            <span class="tool-icon">🔍</span>
            <div class="tool-text">
              <span class="tool-name">Tra Cứu Free Fire</span>
              <span class="tool-desc">Thông tin tài khoản, rank, vật phẩm</span>
            </div>
          </div>
          <span class="tool-arrow">›</span>
        </div>
        <!-- Có thể thêm các tool khác với cấu trúc tương tự -->
      </div>

      <div class="footer-note">FFVN.TGM • Tra cứu nhanh</div>
    </div>

    <!-- ========== TRANG UPDATE ========= -->
    <div id="updatePage" class="update-page">
      <div class="update-icon">🔄</div>
      <div class="update-title">ĐANG CẬP NHẬT</div>
      <div class="update-sub">
        ⚡ Phiên bản mới đang được phát triển.<br>
        Vui lòng quay lại sau. FFVN.TGM
      </div>
      <button class="back-home-btn" id="backToHomeBtn">
        <span>🏠</span> Về Trang Chủ
      </button>
    </div>
  </div>

  <script>
    (function() {
      const TRA_CUU_URL = "https://tra-cuu-info.vercel.app/";

      const homePage = document.getElementById('homePage');
      const updatePage = document.getElementById('updatePage');
      const menuToggle = document.getElementById('menuToggle');
      const menuDropdown = document.getElementById('menuDropdown');
      const menuHomeBtn = document.getElementById('menuHomeBtn');
      const menuUpdateBtn = document.getElementById('menuUpdateBtn');
      const toolTraCuu = document.getElementById('toolTraCuu');
      const backToHomeBtn = document.getElementById('backToHomeBtn');

      function showHomePage() {
        homePage.classList.remove('hidden');
        homePage.style.display = 'block';
        updatePage.classList.remove('active-page');
        updatePage.style.display = 'none';
        menuDropdown.classList.remove('active');
      }

      function showUpdatePage() {
        homePage.classList.add('hidden');
        homePage.style.display = 'none';
        updatePage.classList.add('active-page');
        updatePage.style.display = 'flex';
        menuDropdown.classList.remove('active');
      }

      // Toggle menu
      menuToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        menuDropdown.classList.toggle('active');
      });

      document.addEventListener('click', function(event) {
        if (!menuDropdown.contains(event.target) && event.target !== menuToggle) {
          menuDropdown.classList.remove('active');
        }
      });

      // Menu: Trang chủ
      menuHomeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        showHomePage();
      });

      // Menu: UPDATE
      menuUpdateBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        showUpdatePage();
      });

      // Click vào card Tra Cứu Free Fire
      toolTraCuu.addEventListener('click', function() {
        window.open(TRA_CUU_URL, '_blank');
      });

      // Nút quay về từ trang update
      backToHomeBtn.addEventListener('click', function() {
        showHomePage();
      });

      // Mặc định hiển thị trang chủ
      showHomePage();

      // Click logo nhỏ để về đầu trang hoặc về home nếu đang update
      document.querySelector('.logo-small')?.addEventListener('click', function() {
        if (updatePage.classList.contains('active-page')) {
          showHomePage();
        } else {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

    })();
  </script>
</body>
  </html>
